name: CI

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

jobs:
  # -------------------------------------------------------
  # 🔒 SECURITY JOB
  # Runs security checks before any build or test
  # - npm audit: scans for vulnerable dependencies
  # - trufflehog: scans for leaked secrets/credentials
  # - license-checker: ensures all licenses are compliant
  # -------------------------------------------------------
  security:
    name: 🔒 Security Checks
    runs-on: ubuntu-latest
    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: 'npm'

      - name: Install dependencies
        run: npm ci

      # Scans all dependencies for known vulnerabilities
      # continue-on-error: true allows pipeline to continue
      # even if vulnerabilities are found (non-blocking warning)
      - name: 🔍 Run npm audit
        run: npm audit --audit-level=moderate
        continue-on-error: true

      # Scans git history and code for secrets, API keys,
      # tokens or credentials that should not be committed
      - name: 🔐 Scan for secrets
        uses: trufflesecurity/trufflehog@main
        with:
          path: ./
          base: ${{ github.event.repository.default_branch }}
          head: HEAD

      # Validates that all third-party licenses are compliant
      # with the allowed list (MIT, Apache, ISC, BSD)
      - name: 📋 Check licenses
        run: npm install -g license-checker && license-checker --onlyAllow "MIT,Apache-2.0,ISC,BSD,BSD-2-Clause,BSD-3-Clause"
        continue-on-error: true

  # -------------------------------------------------------
  # 📝 LINT JOB
  # Runs ESLint to catch code quality issues
  # and enforce consistent code style
  # -------------------------------------------------------
  lint:
    name: 📝 Lint
    runs-on: ubuntu-latest
    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: 'npm'

      - name: Install dependencies
        run: npm ci

      - name: Run ESLint
        run: npm run lint

  # -------------------------------------------------------
  # 🧪 TEST JOB
  # Runs Jest unit tests with coverage report
  # - Component snapshot tests
  # - API route tests
  # -------------------------------------------------------
  test:
    name: 🧪 Tests
    runs-on: ubuntu-latest
    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: 'npm'

      - name: Install dependencies
        run: npm ci

      # Runs all tests and generates coverage report
      - name: Run tests
        run: npm run test:coverage

  # -------------------------------------------------------
  # 🏗️ BUILD JOB
  # Only runs after security, lint and tests pass
  # Ensures the app builds successfully before deployment
  # -------------------------------------------------------
  build:
    name: 🏗️ Build
    runs-on: ubuntu-latest
    needs: [security, lint, test]
    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: 'npm'

      - name: Install dependencies
        run: npm ci

      - name: Build project
        run: npm run build

      - name: 📊 Upload build artifact
        uses: actions/upload-artifact@v4
        with:
          name: build-output
          path: .next/