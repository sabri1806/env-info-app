name: CI

on:
  push:
    branches: [main, preview-br]
  pull_request:
    branches: [main, preview-br]

jobs:
  # -------------------------------------------------------
  # 🔒 SECURITY JOB
  # Runs security checks before any build or test
  # - npm audit: scans for vulnerable dependencies
  # - trufflehog: scans for leaked secrets/credentials
  # - license-checker: ensures all licenses are compliant
  # -------------------------------------------------------
  security:
    name: 🔒 Security Checks
    runs-on: ubuntu-latest
    steps:
      - name: Checkout code
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: 'npm'

      - name: Install dependencies
        run: npm ci

      # Scans all dependencies for known vulnerabilities
      - name: 🔍 Run npm audit
        run: npm audit --audit-level=moderate
        continue-on-error: true

      # Scans for secrets without specifying base/head
      # letting TruffleHog auto-detect based on event type
      - name: 🔐 Scan for secrets
        uses: trufflesecurity/trufflehog@main
        with:
          path: ./
          extra_args: --only-verified
        continue-on-error: true

      # Validates that all third-party licenses are compliant
      - name: 📋 Check licenses
        run: npm install -g license-checker && license-checker --onlyAllow "MIT,Apache-2.0,ISC,BSD,BSD-2-Clause,BSD-3-Clause"
        continue-on-error: true

  # -------------------------------------------------------
  # 📝 LINT JOB
  # -------------------------------------------------------
  lint:
    name: 📝 Lint
    runs-on: ubuntu-latest
    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: 'npm'

      - name: Install dependencies
        run: npm ci

      - name: Run ESLint
        run: npm run lint

  # -------------------------------------------------------
  # 🧪 TEST JOB
  # -------------------------------------------------------
  test:
    name: 🧪 Tests
    runs-on: ubuntu-latest
    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: 'npm'

      - name: Install dependencies
        run: npm ci

      - name: Run tests
        run: npm run test:coverage

  # -------------------------------------------------------
  # 🏗️ BUILD JOB
  # Only runs after security, lint and tests pass
  # -------------------------------------------------------
  build:
    name: 🏗️ Build
    runs-on: ubuntu-latest
    needs: [security, lint, test]
    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: 'npm'

      - name: Install dependencies
        run: npm ci

      - name: Build project
        run: npm run build

      - name: 📊 Upload build artifact
        uses: actions/upload-artifact@v4
        with:
          name: build-output
          path: .next/